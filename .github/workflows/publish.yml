name: Publish skills

# Push a semver tag to publish a release:
#
#   git tag v1.1.0 && git push --tags
#
# The workflow is triggered by the tag push, so the tag already exists when the
# job runs. `gh skill publish --tag` would try to *create* that tag and fail, so
# we instead re-validate every skill against the Agent Skills spec (a malformed
# skill blocks the release just as it blocks a PR), then create a GitHub release
# from the existing tag with auto-generated notes.
on:
  push:
    tags:
      - "v*"

# contents: write lets gh create the release for the pushed tag.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        run: gh skill publish --dry-run
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release for ${{ github.ref_name }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
